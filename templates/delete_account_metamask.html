<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete MetaMask Account</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .center-box {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #23272a 60%, #4fc3f7 100%);
        }
        .delete-card {
            background: #23272a;
            border-radius: 24px;
            box-shadow: 0 8px 32px #000a;
            padding: 2.5rem 1.2rem 2rem 1.2rem;
            width: 100%;
            max-width: 370px;
            animation: fadeIn 0.7s;
        }
        .delete-card h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #ff4f4f;
            font-size: 2rem;
        }
        .delete-info {
            color: #f1f1f1;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.08rem;
        }
        .delete-btn {
            width: 100%;
            background: linear-gradient(90deg, #ff4f4f, #ffb347);
            color: #181a1b;
            border: none;
            padding: 0.9rem 0;
            border-radius: 14px;
            font-size: 1.13rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.3s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px #0003;
        }
        .delete-btn:hover {
            background: linear-gradient(90deg, #ffb347, #ff4f4f);
            color: #23272a;
            box-shadow: 0 0 16px #ff4f4f;
        }
        .delete-footer {
            text-align: center;
            margin-top: 1.5rem;
        }
        .delete-footer a {
            color: #4fc3f7;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .delete-footer a:hover {
            color: #ffb347;
        }
    </style>
</head>
<body>
    <div class="center-box">
        <form class="delete-card" method="post">
            <h1><i class="fa-solid fa-user-xmark"></i> Delete Account</h1>
            <div class="delete-info">
                Are you sure you want to delete your MetaMask account?<br>
                <span style="color:#4fc3f7;">{{ metamask }}</span><br>
                This action cannot be undone.<br>
            </div>
            <input class="delete-btn" type="submit" value="Delete Account">
            <div class="delete-footer">
                <a href="/dashboard">Back to Dashboard</a>
            </div>
        </form>
    </div>
</body>
</html>
